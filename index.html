<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guru Ji AstroPalm Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .grid-cell { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid #cbd5e1; font-weight: bold; font-size: 1.2rem;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONSTANTS & TABLES ---
        const CHALDEAN = {
            A:1, I:1, J:1, Q:1, Y:1,
            B:2, K:2, R:2,
            C:3, G:3, L:3, S:3,
            D:4, M:4, T:4,
            E:5, H:5, N:5, X:5,
            U:6, V:6, W:6,
            O:7, Z:7,
            F:8, P:8
        };

        const RAHU_KAAL = {
            0: "16:30 - 18:00", // Sunday
            1: "07:30 - 09:00", // Monday
            2: "15:00 - 16:30", // Tuesday
            3: "12:00 - 13:30", // Wednesday
            4: "13:30 - 15:00", // Thursday
            5: "10:30 - 12:00", // Friday
            6: "09:00 - 10:30"  // Saturday
        };

        const YAMAGANDA = {
            0: "12:00 - 13:30", // Sunday
            1: "10:30 - 12:00", // Monday
            2: "09:00 - 10:30", // Tuesday
            3: "07:30 - 09:00", // Wednesday
            4: "06:00 - 07:30", // Thursday
            5: "15:00 - 16:30", // Friday
            6: "13:30 - 15:00"  // Saturday
        };

        // --- HELPER FUNCTIONS ---
        const calculateChaldean = (name) => {
            if (!name) return 0;
            return name.toUpperCase().split('').reduce((sum, char) => sum + (CHALDEAN[char] || 0), 0);
        };

        const reduceToSingleDigit = (num) => {
            if (!num) return 0;
            while (num > 9) {
                num = num.toString().split('').reduce((sum, digit) => sum + parseInt(digit), 0);
            }
            return num;
        };

        const generateLoShu = (dobStr, moolank, bhagyank) => {
            if (!dobStr) return [];
            const digits = dobStr.replace(/\D/g, '').split('').map(Number).filter(n => n !== 0);
            digits.push(moolank, bhagyank);
            return digits;
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            // State with Local Storage Persistence
            const [dob, setDob] = useState(() => localStorage.getItem('astro_dob') || "");
            const [firstName, setFirstName] = useState(() => localStorage.getItem('astro_first') || "");
            const [lastName, setLastName] = useState(() => localStorage.getItem('astro_last') || "");
            const [rashi, setRashi] = useState(() => localStorage.getItem('astro_rashi') || "Aries");

            useEffect(() => {
                localStorage.setItem('astro_dob', dob);
                localStorage.setItem('astro_first', firstName);
                localStorage.setItem('astro_last', lastName);
                localStorage.setItem('astro_rashi', rashi);
            }, [dob, firstName, lastName, rashi]);

            // Calculations
            let moolank = 0;
            let bhagyank = 0;
            let gridNumbers = [];
            let missingNumbers = [1,2,3,4,5,6,7,8,9];

            if (dob) {
                const dateParts = dob.split('-'); // YYYY-MM-DD
                if(dateParts.length === 3) {
                    const day = parseInt(dateParts[2]);
                    moolank = reduceToSingleDigit(day);
                    
                    const fullSum = dateParts.join('').split('').reduce((sum, d) => sum + parseInt(d), 0);
                    bhagyank = reduceToSingleDigit(fullSum);

                    gridNumbers = generateLoShu(dob, moolank, bhagyank);
                    missingNumbers = [1,2,3,4,5,6,7,8,9].filter(n => !gridNumbers.includes(n));
                }
            }

            const firstTotal = calculateChaldean(firstName);
            const firstReduced = reduceToSingleDigit(firstTotal);
            const lastTotal = calculateChaldean(lastName);
            const fullTotal = firstTotal + lastTotal;
            const fullReduced = reduceToSingleDigit(fullTotal);

            const isMarsRuled = rashi === "Aries" || rashi === "Scorpio";

            // PDF Generation Function with your strict Babel fix
            const generatePDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFontSize(22);
                doc.text("Guru Ji AstroPalm Dashboard", 20, 20);
                
                doc.setFontSize(12);
                doc.text(`DOB: ${dob} | Moolank: ${moolank} | Bhagyank: ${bhagyank}`, 20, 30);
                doc.text(`Everyday Name: ${firstName} (${firstTotal} -> ${firstReduced})`, 20, 40);
                doc.text(`Official Name: ${firstName} ${lastName} (${fullTotal} -> ${fullReduced})`, 20, 50);

                doc.text("Lo Shu Presence:", 20, 70);
                const AMBER = [255, 191, 0];
                const LGREY = [200, 200, 200];

                let yPos = 80;
                [1,2,3,4,5,6,7,8,9].forEach((num, index) => {
                    const present = gridNumbers.includes(num);
                    // YOUR FIX APPLIED HERE: Spread operator wrapped correctly around the ternary result
                    doc.setTextColor(...(present ? AMBER : LGREY));
                    doc.text(`${num}: ${present ? "Present" : "Missing"}`, 20, yPos + (index * 10));
                });

                doc.setTextColor(0,0,0);
                if(isMarsRuled) {
                    doc.text("MARTIAN ENERGY (Rashi Level) - Active", 20, yPos + 100);
                }

                doc.save("AstroPalm_Report.pdf");
            };

            return (
                <div className="max-w-4xl mx-auto p-6">
                    <header className="bg-slate-900 text-white p-6 rounded-t-lg shadow-lg flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-bold text-amber-500">Guru Ji AstroPalm</h1>
                            <p className="text-sm opacity-80">Advanced Vedic & Chaldean Dashboard V5</p>
                        </div>
                        <button onClick={generatePDF} className="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-2 px-4 rounded">
                            Download PDF Report
                        </button>
                    </header>

                    <div className="bg-white p-6 shadow-lg rounded-b-lg space-y-8">
                        
                        {/* Section 1: Core Data */}
                        <section className="bg-slate-50 p-4 rounded border border-slate-200">
                            <h2 className="text-xl font-bold mb-4 border-b pb-2">1. Foundation Data</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-bold mb-1">Date of Birth</label>
                                    <input type="date" value={dob} onChange={e => setDob(e.target.value)} className="w-full border p-2 rounded" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold mb-1">Moon Sign (Rashi)</label>
                                    <select value={rashi} onChange={e => setRashi(e.target.value)} className="w-full border p-2 rounded">
                                        <option value="Aries">Mesha (Aries)</option>
                                        <option value="Taurus">Vrishabha (Taurus)</option>
                                        <option value="Scorpio">Vrishchika (Scorpio)</option>
                                        <option value="Pisces">Meena (Pisces)</option>
                                    </select>
                                </div>
                            </div>
                            
                            {dob && (
                                <div className="mt-4 flex space-x-6">
                                    <div className="bg-amber-100 p-3 rounded text-amber-900"><strong>Moolank:</strong> {moolank}</div>
                                    <div className="bg-amber-100 p-3 rounded text-amber-900"><strong>Bhagyank:</strong> {bhagyank}</div>
                                    <div className="bg-red-100 p-3 rounded text-red-900"><strong>Missing:</strong> {missingNumbers.join(', ')}</div>
                                </div>
                            )}
                        </section>

                        {/* Section 2: Dual-Vibration Name Lock */}
                        <section className="bg-slate-50 p-4 rounded border border-slate-200">
                            <h2 className="text-xl font-bold mb-4 border-b pb-2">2. Dual-Vibration Name Engine</h2>
                            <p className="text-sm text-slate-600 mb-4">First name sets everyday vibration. Full name locks official destiny path.</p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-bold mb-1">Everyday Name (First Name)</label>
                                    <input type="text" value={firstName} onChange={e => setFirstName(e.target.value)} className="w-full border p-2 rounded uppercase" placeholder="E.g., NAVYAA" />
                                    <div className="mt-2 text-sm">
                                        Compound: <strong>{firstTotal}</strong> &rarr; Final: <strong className="text-blue-600 text-lg">{firstReduced}</strong>
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold mb-1">Family Name (Surname)</label>
                                    <input type="text" value={lastName} onChange={e => setLastName(e.target.value)} className="w-full border p-2 rounded uppercase" placeholder="E.g., SAGAR" />
                                    <div className="mt-2 text-sm">
                                        Surname Compound: <strong>{lastTotal}</strong>
                                    </div>
                                </div>
                            </div>

                            {(firstName || lastName) && (
                                <div className="mt-4 p-4 bg-green-50 border border-green-200 rounded">
                                    <h3 className="font-bold text-green-800">Official Full Name Result:</h3>
                                    <p className="text-lg tracking-widest">{firstName.toUpperCase()} {lastName.toUpperCase()}</p>
                                    <p className="text-md mt-1">Total Compound: <strong>{fullTotal}</strong> &rarr; Final Destiny Lock: <strong className="text-green-700 text-xl">{fullReduced}</strong></p>
                                    
                                    <div className="mt-3 text-sm flex space-x-4">
                                        <span className={missingNumbers.includes(firstReduced) ? "text-green-600 font-bold" : "text-slate-500"}>
                                            {missingNumbers.includes(firstReduced) ? `✅ First Name fills missing ${firstReduced}` : `⚠️ First Name (${firstReduced}) does not fill a missing gap`}
                                        </span>
                                        <span className={missingNumbers.includes(fullReduced) ? "text-green-600 font-bold" : "text-slate-500"}>
                                            {missingNumbers.includes(fullReduced) ? `✅ Full Name fills missing ${fullReduced}` : `⚠️ Full Name (${fullReduced}) does not fill a missing gap`}
                                        </span>
                                    </div>
                                </div>
                            )}
                        </section>

                        {/* Section 3: Astrological Event Engine (Yamaganda Added) */}
                        <section className="bg-slate-50 p-4 rounded border border-slate-200">
                            <h2 className="text-xl font-bold mb-4 border-b pb-2">3. Muhurat & Dosha Checks</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <h3 className="font-bold text-sm mb-2">Daily Inauspicious Windows (IST)</h3>
                                    <div className="text-xs space-y-1 text-slate-700">
                                        <p><strong>Today's Rahu Kaal:</strong> {RAHU_KAAL[new Date().getDay()]} <span className="text-red-500">(Strictly Avoid)</span></p>
                                        <p><strong>Today's Yamaganda:</strong> {YAMAGANDA[new Date().getDay()]} <span className="text-orange-500">(Caution/Avoid)</span></p>
                                    </div>
                                </div>
                                <div>
                                    <h3 className="font-bold text-sm mb-2">Natal Rashi Analysis</h3>
                                    {isMarsRuled ? (
                                        <div className="bg-orange-100 p-3 rounded border border-orange-300">
                                            <p className="font-bold text-orange-800">⚠️ MARTIAN ENERGY (Rashi Level)</p>
                                            <p className="text-xs text-orange-700 mt-1">Confidence: 5/10. Mars rules {rashi}. Full chart needed to confirm true Kuja/Mangal Dosha.</p>
                                        </div>
                                    ) : (
                                        <div className="bg-green-100 p-3 rounded border border-green-300">
                                            <p className="font-bold text-green-800">✅ Standard Temperament</p>
                                            <p className="text-xs text-green-700 mt-1">No direct Martian rulership detected at Rashi level.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </section>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
