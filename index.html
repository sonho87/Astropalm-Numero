function cN(name){if(!name)return{t:0,r:0,c:0,l:''};const cl=name.toUpperCase().replace(/[^A-Z]/g,'');let t=0;for(const c of cl)t+=(CH[c]||0);let r=t;while(r>9)r=String(r).split('').reduce((a,b)=>a+parseInt(b),0);return{t,r,c:t>9?t:0,l:cl}}
function cB(d){let n=d;while(n>9)n=String(n).split('').reduce((a,b)=>a+parseInt(b),0);return{r:n,c:d>9?d:0}}
function cL(d,m,y){const s=`${d}${m}${y}`.split('').map(Number).reduce((a,b)=>a+b,0);let r=s;while(r>9)r=String(r).split('').reduce((a,b)=>a+parseInt(b),0);return{r,c:s>9?s:0}}
function cPY(d,m,y){let s=`${d}${m}${y}`.split('').map(Number).reduce((a,b)=>a+b,0);while(s>9)s=String(s).split('').reduce((a,b)=>a+parseInt(b),0);return s}
function cKua(yr,g){let d=String(yr).split('').map(Number);let s=d.reduce((a,b)=>a+b,0);while(s>9)s=String(s).split('').reduce((a,b)=>a+parseInt(b),0);let k;if(yr<2000){k=g==='M'?(10-s):(5+s)}else{k=g==='M'?(9-s):(6+s)};if(k===0)k=9;if(k===5)k=g==='M'?2:8;while(k>9)k=String(k).split('').reduce((a,b)=>a+parseInt(b),0);if(k===0)k=9;return k}
// Lo Shu Grid: DOB digits + Moolank (Birth#) + Bhagyank (LifePath#) all go into grid
function gG(day,month,year,nameNum,kuaM,kuaF){
  // Step 1: Get all digits from full DOB, exclude 0
  const rawDigits=`${day}${month}${year}`.split('').map(Number).filter(d=>d>0);
  // Step 2: Calculate Moolank (Birth Number) and Bhagyank (Life Path)
  let bn=day;while(bn>9)bn=String(bn).split('').reduce((a,b)=>a+parseInt(b),0);
  let lpSum=`${day}${month}${year}`.split('').map(Number).reduce((a,b)=>a+b,0);
  let lp=lpSum;while(lp>9)lp=String(lp).split('').reduce((a,b)=>a+parseInt(b),0);
  // Step 3: Combine all — DOB digits + Moolank + Bhagyank
  const allDigits=[...rawDigits];
  if(bn>0)allDigits.push(bn);
  if(lp>0)allDigits.push(lp);
  // Step 4: Count occurrences in each box (1-9)
  const counts={};for(let i=1;i<=9;i++)counts[i]=0;
  allDigits.forEach(d=>{if(d>=1&&d<=9)counts[d]++});
  const present=[];const missing=[];
  for(let i=1;i<=9;i++){if(counts[i]>0)present.push(i);else missing.push(i)}
  return{counts,present,missing,birthNum:bn,lifeP:lp,nameNum:nameNum||0,kuaM:kuaM||0,kuaF:kuaF||0,digits:rawDigits,allDigits}
}

function getPI(pd,bb,bl,ni){

  if(bc==='Same')pts.push({t:'pos',x:`Birth SAME (${pd.b.r}) = deep karmic bond. Intuitive understanding.`});

  if(lc==='Same')pts.push({t:'pos',x:`Life Paths SAME (${pd.lp.r}) = shared destiny road.`});
  if(lc==='Friendly')pts.push({t:'pos',x:`LP ${pd.lp.r}+${bl.r} = Friendly. Destiny paths support each other.`});
  if(lc==='Hostile')pts.push({t:'neg',x:`LP ${pd.lp.r}+${bl.r} = Hostile. Different life directions.`});
  if(pd.b.r===bl.r)pts.push({t:'pos',x:`Parent Birth=${pd.b.r} matches Child LP=${bl.r}. Deep guidance potential.`});
  if(pd.lp.r===bb.r)pts.push({t:'pos',x:`Parent LP=${pd.lp.r} matches Child Birth=${bb.r}. Destiny supports child.`});
  if(pd.n){const nc=gF(pd.n.r,bb.r);if(nc==='Friendly'||nc==='Same')pts.push({t:'pos',x:`Parent name(${pd.n.r}) ${nc} with baby Birth(${bb.r}). Name vibration supports child.`});

// ─── PDF: collect text from DOM element and write with jsPDF ───
function downloadPDF(elementId,filename){
  const el=document.getElementById(elementId);
  if(!el){alert('Please generate the report first, then download.');return;}
  const {jsPDF}=window.jspdf;
  if(!jsPDF){alert('PDF library not loaded. Check internet connection.');return;}
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pw=210,ph=297,ml=15,tw=180,lh=5.8;
  let y=22;
  const AMBER=[139,105,20];const DARK=[28,28,30];const GREY=[107,104,96];
  const GREEN=[22,101,52];const RED=[153,27,27];const BLUE=[29,78,216];
  const LGREY=[240,232,220];const WHITE=[255,255,255];
  function drawHdr(){
    doc.setFillColor(...AMBER);doc.rect(0,0,pw,14,'F');
    doc.setTextColor(...WHITE);doc.setFontSize(11);doc.setFont('helvetica','bold');
    doc.text('GURU JI ASTROPALM',pw/2,9,{align:'center'});
    doc.setFontSize(6);doc.setFont('helvetica','normal');
    doc.text('CHALDEAN + VEDIC + KUA ANALYSIS',pw/2,13,{align:'center'});
  }
  function checkY(n){if(y+n>ph-14){doc.addPage();y=22;drawHdr();}}
  drawHdr();
  // Collect text nodes with deduplication
  const seen=new Set();const lines=[];
  function walk(node){
    if(!node)return;
    const tag=node.tagName?.toLowerCase();
    if(['script','style','button','a'].includes(tag))return;
    try{const cs=window.getComputedStyle(node);if(cs&&(cs.display==='none'||cs.visibility==='hidden'))return;}catch(e){}
    if(node.nodeType===3){
      const t=(node.textContent||'').trim();
      if(t.length<2||seen.has(t))return;
      seen.add(t);
      const p=node.parentElement;
      let fs=11,fw='400',col='';
      try{const pcs=p?window.getComputedStyle(p):null;if(pcs){fs=parseFloat(pcs.fontSize)||11;fw=pcs.fontWeight||'400';col=pcs.color||'';}}catch(e){}
      const isBold=fw==='700'||fw==='bold'||parseInt(fw)>=700;
      const isGreen=col.includes('22, 101')||col.includes('21, 128')||col.includes('15, 128');
      const isRed=col.includes('153, 27')||col.includes('185, 28');
      const isAmber=col.includes('139, 105')||col.includes('146, 64');
      const isBlue=col.includes('29, 78')||col.includes('30, 64');
      lines.push({text:t,fs,isBold,isGreen,isRed,isAmber,isBlue});
    }else{node.childNodes.forEach(c=>walk(c));}
  }
  walk(el);
  lines.forEach((l,i)=>{
    if(!l.text||l.text.length<2)return;
    const t=l.text;
    if(l.fs>=15||(l.isBold&&l.fs>=13)){
      checkY(14);if(i>0)y+=2;
      doc.setFillColor(...LGREY);doc.roundedRect(ml,y-5,tw,8,2,2,'F');
      doc.setTextColor(...AMBER);doc.setFontSize(10);doc.setFont('helvetica','bold');
      doc.text(t.length>85?t.slice(0,85)+'…':t,ml+3,y,{maxWidth:tw-4});
      y+=6;doc.setDrawColor(...AMBER);doc.setLineWidth(0.3);doc.line(ml,y,ml+tw,y);y+=4;
    }else if(l.isBold&&l.fs>=11){
      checkY(10);y+=1;
      doc.setTextColor(...DARK);doc.setFontSize(9);doc.setFont('helvetica','bold');
      doc.text(t.length>95?t.slice(0,95)+'…':t,ml,y,{maxWidth:tw});y+=lh+1;
    }else{
      checkY(7);
      if(l.isGreen){doc.setTextColor(...GREEN);doc.setFont('helvetica','normal');}
      else if(l.isRed){doc.setTextColor(...RED);doc.setFont('helvetica','normal');}
      else if(l.isAmber){doc.setTextColor(...AMBER);doc.setFont('helvetica','italic');}
      else if(l.isBlue){doc.setTextColor(...BLUE);doc.setFont('helvetica','normal');}
      else{doc.setTextColor(...GREY);doc.setFont('helvetica','normal');}
      doc.setFontSize(8);
      const pfx=l.isGreen?'❖ ':l.isRed?'▸ ':l.isAmber?'◉ ':'  ';
      const wrapped=doc.splitTextToSize(pfx+(t.length>150?t.slice(0,150)+'…':t),tw-4);
      wrapped.forEach(line=>{checkY(6);doc.text(line,ml+2,y);y+=lh;});
    }
  });
  const n=doc.internal.getNumberOfPages();
  for(let i=1;i<=n;i++){
    doc.setPage(i);doc.setFillColor(...LGREY);doc.rect(0,ph-10,pw,10,'F');
    doc.setTextColor(...GREY);doc.setFontSize(6);doc.setFont('helvetica','normal');

    doc.text(i+'/'+n,pw-ml,ph-5,{align:'right'});
    doc.text(new Date().toLocaleDateString('en-IN'),ml,ph-5);
  }
  doc.save(filename||'AstroPalm_Report.pdf');
}

// ═══════ PERSONAL READING PDF — DATA DRIVEN (no DOM capture) ═══════
function generatePersonalPDF(r, name, dn, lagna, maha, antar){
  if(!r){alert('Please generate the reading first.');return;}
  const {jsPDF}=window.jspdf;
  if(!jsPDF){alert('PDF library not loaded.');return;}

  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pw=210,ph=297,ml=15,tw=180,lh=5.8;
  let y=22;
  const AMBER=[139,105,20];const DARK=[28,28,30];const GREY=[100,96,88];
  const GREEN=[22,101,52];const RED=[153,27,27];const BLUE=[29,78,216];
  const LGREY=[240,232,220];const WHITE=[255,255,255];const CREAM=[250,248,244];

  function hdr(){
    doc.setFillColor(...AMBER);doc.rect(0,0,pw,14,'F');
    doc.setTextColor(...WHITE);doc.setFontSize(11);doc.setFont('helvetica','bold');
    doc.text('GURU JI ASTROPALM',pw/2,9,{align:'center'});
    doc.setFontSize(6);doc.setFont('helvetica','normal');
    doc.text('CHALDEAN NUMEROLOGY + VEDIC ASTROLOGY + KUA NUMBER',pw/2,13,{align:'center'});
  }
  function np(){doc.addPage();y=20;hdr();}
  function cy(n=8){if(y+n>ph-14)np();}

  function secHead(title,badge){
    cy(14);y+=3;
    doc.setFillColor(...LGREY);
    doc.roundedRect(ml,y-5,tw,9,2,2,'F');
    doc.setTextColor(...AMBER);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text(title,ml+3,y,{maxWidth:tw-30});
    if(badge){
      doc.setFontSize(7);doc.setFont('helvetica','normal');
      doc.setTextColor(...GREY);
      doc.text(badge,ml+tw-2,y,{align:'right'});
    }
    y+=7;
    doc.setDrawColor(...AMBER);doc.setLineWidth(0.3);doc.line(ml,y,ml+tw,y);y+=4;
  }

  function line(text,type='body'){
    if(!text||String(text).trim().length<1)return;
    const t=String(text).replace(/[^\x20-\x7E\u0900-\u097F ]/g,'').trim();
    if(!t)return;
    cy(7);
    if(type==='pos'){doc.setTextColor(...GREEN);doc.setFont('helvetica','normal');doc.setFontSize(8);}
    else if(type==='neg'){doc.setTextColor(...RED);doc.setFont('helvetica','normal');doc.setFontSize(8);}
    else if(type==='warn'){doc.setTextColor(...AMBER);doc.setFont('helvetica','italic');doc.setFontSize(8);}
    else if(type==='head2'){doc.setTextColor(...DARK);doc.setFont('helvetica','bold');doc.setFontSize(9);}
    else if(type==='label'){doc.setTextColor(...GREY);doc.setFont('helvetica','bold');doc.setFontSize(7.5);}
    else{doc.setTextColor(...DARK);doc.setFont('helvetica','normal');doc.setFontSize(8);}
    const prefix=type==='pos'?'+ ':type==='neg'?'- ':type==='warn'?'> ':'  ';
    const wrapped=doc.splitTextToSize((type==='head2'||type==='label'?'':prefix)+t,tw-4);
    wrapped.forEach(wl=>{cy(6);doc.text(wl,ml+(type==='head2'||type==='label'?0:2),y);y+=lh;});
  }

  function row(label,value,sub){
    cy(10);
    doc.setFillColor(250,247,242);doc.rect(ml,y-4,tw,8,'F');
    doc.setTextColor(...GREY);doc.setFontSize(7.5);doc.setFont('helvetica','bold');
    doc.text(label,ml+2,y);
    doc.setTextColor(...DARK);doc.setFont('helvetica','normal');
    const v=String(value||'').replace(/[^\x20-\x7E]/g,'');
    doc.text(v,ml+tw-2,y,{align:'right',maxWidth:tw/2});
    if(sub){doc.setTextColor(...GREY);doc.setFontSize(6.5);doc.text(String(sub).replace(/[^\x20-\x7E]/g,''),ml+tw-2,y+4,{align:'right',maxWidth:tw/2});}
    y+=sub?10:8;
  }

  function divider(){cy(4);doc.setDrawColor(...LGREY);doc.setLineWidth(0.2);doc.line(ml,y,ml+tw,y);y+=4;}

  hdr();

  // ── BANNER ──
  doc.setFillColor(139,105,20);doc.roundedRect(ml,y,tw,22,3,3,'F');
  doc.setTextColor(...WHITE);doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text(name||'Personal Reading',pw/2,y+9,{align:'center'});
  if(dn&&dn!==name){doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text('Known as: '+dn,pw/2,y+15,{align:'center'});}
  // Number strip
  const nums=[
    {l:'Moolank',v:r.b.r},{l:'Bhagyank',v:r.lp.r},{l:'Name#',v:r.nc.r},
    {l:'Kua',v:r.kua},{l:'PY 2026',v:r.py}
  ];
  const bw=tw/nums.length;
  nums.forEach((n,i)=>{
    const x=ml+i*bw+bw/2;
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(...WHITE);
    doc.text(String(n.v),x,y+20,{align:'center'});
  });
  y+=26;

  // Number strip labels
  nums.forEach((n,i)=>{
    const x=ml+i*bw+bw/2;
    doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.setTextColor(...GREY);
    doc.text(n.l,x,y,{align:'center'});
  });
  y+=6;divider();

  // ── KEY NUMBERS ──
  secHead('Core Numbers at a Glance','Chaldean 10/10');
  row('Moolank (Birth#)',`${r.b.r} - ${r.md_deep?.title||''}`,r.b.c>9?`Compound ${r.b.c}: ${CO[r.b.c]||''}`:null);
  row('Bhagyank (Life Path)',`${r.lp.r} - ${PN[r.lp.r]||''}`,r.lp.c>9?`Compound ${r.lp.c}: ${CO[r.lp.c]||''}`:null);
  row('Official Name Number',`${r.nc.r} - ${PN[r.nc.r]||''}`,r.nc.c>9?`Compound ${r.nc.c}: ${CO[r.nc.c]||''}`:null);
  if(r.dc)row('Daily Name Number',`${r.dc.r} - ${PN[r.dc.r]||''}`,r.dc.c>9?`Compound ${r.dc.c}: ${CO[r.dc.c]||''}`:null);
  row('Kua Number',`${r.kua} - ${KE[r.kua]||''}`,`Direction: ${KD[r.kua]||''} | ${KG.east.includes(r.kua)?'East':'West'} Group`);
  row('Personal Year 2026',`PY ${r.py}`,r.py_mean?.split('.')[0]);
  row('Born on',`${WD[r.wd]||''} - ${WDP[r.wd]||''}`,null);
  if(lagna)row('Lagna (Ascendant)',`${lagna} (${RE[lagna]||''})`,`Lord: ${RL[lagna]||''}`);

  // ── LO SHU GRID ──
  secHead('Lo-Shu Birth Grid','Chaldean 10/10');
  line(`DOB: ${r.dd}/${r.mm}/${r.yy} | Moolank: ${r.b.r} | Bhagyank: ${r.lp.r}`,'warn');
  // Draw grid
  const gx=ml+30,gy=y,gs=18;
  const layout=[[4,9,2],[3,5,7],[8,1,6]];
  layout.forEach((row2,ri)=>{
    row2.forEach((num,ci)=>{
      const nx=gx+ci*gs,ny=gy+ri*gs;
      const present=r.grid.present.includes(num);
      doc.setFillColor(present?245:250,present?237:247,present?208:242);
      doc.roundedRect(nx,ny,gs-1,gs-1,2,2,'F');
      doc.setDrawColor(...LGREY);doc.setLineWidth(0.3);doc.roundedRect(nx,ny,gs-1,gs-1,2,2,'S');
      doc.setTextColor(...(present?AMBER:LGREY));
      doc.setFontSize(10);doc.setFont('helvetica','bold');
      doc.text(String(num),nx+gs/2-0.5,ny+10,{align:'center'});
      const cnt=(r.grid.nums||{})[num];
      if(cnt>1){doc.setFontSize(6);doc.text(`x${cnt}`,nx+gs-4,ny+4);}
    });
  });
  // Grid legend
  const legX=gx+gs*3+4;
  doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(...GREY);
  doc.text(`Missing: ${r.missing.map(n=>`${n}(${PN[n]?.split('(')[0]||n})`).join(', ')||'None'}`,legX,gy+6,{maxWidth:60});
  doc.text(`Kua: ${r.kua}${r.grid.present.includes(r.kua)?'':' - fills gap!'}`,legX,gy+14);
  doc.text(`Name #${r.nc.r}${r.grid.present.includes(r.nc.r)?' - overlaps':' - fills gap!'}`,legX,gy+22);
  y=gy+gs*3+6;divider();

  // ── CORE IDENTITY ──
  if(r.md_deep){
    secHead(`Core Identity - ${r.md_deep.title}`,'Moolank');
    line(`Born on ${r.dd}th — Moolank ${r.b.r}${r.b.c>9?` (Compound ${r.b.c}: ${CO[r.b.c]||''})`:''}`,'warn');
    r.md_deep.core.forEach(c=>line(c,'body'));
    divider();

    // ── STRENGTHS & SHADOWS ──
    secHead('Strengths & Shadow Sides','Chaldean 9/10');
    line('STRENGTHS','head2');
    r.md_deep.strength.forEach(s=>line(s,'pos'));
    y+=2;line('SHADOW SIDES','head2');
    r.md_deep.weakness.forEach(w=>line(w,'neg'));
    divider();
  }

  // ── DESTINY ──
  secHead(`Life Path & Destiny - Bhagyank ${r.lp.r}`,'');
  if(r.lp.c>9)line(`Compound ${r.lp.c}: ${CO[r.lp.c]||''}`,'warn');
  line(r.lp_deep||'','body');
  if(r.b.r===r.lp.r)line(`DOUBLE ${r.b.r}: Your Moolank and Bhagyank are identical - your nature and destiny are perfectly aligned. Exceptional.`,'pos');
  if(gF(r.b.r,r.lp.r)==='Hostile')line(`Moolank ${r.b.r} and Bhagyank ${r.lp.r} are hostile - internal tension between natural personality and life destiny. Conscious integration is key.`,'neg');
  if(gF(r.b.r,r.lp.r)==='Friendly')line(`Moolank ${r.b.r} and Bhagyank ${r.lp.r} are friendly - your personality supports your life purpose naturally.`,'pos');
  divider();

  // ── NAME ANALYSIS ──
  secHead('Name Number Analysis','Chaldean 10/10');
  line(`Official name "${name}" = ${r.nc.r} (${PN[r.nc.r]||''})${r.nc.c>9?` | Compound ${r.nc.c}: ${CO[r.nc.c]||''}`:''}`, 'body');
  const nc_compat=gF(r.nc.r,r.b.r);
  if(nc_compat==='Friendly')line(`Name ${r.nc.r} is FRIENDLY with Moolank ${r.b.r} - name amplifies your natural energy.`,'pos');
  else if(nc_compat==='Hostile')line(`Name ${r.nc.r} CONFLICTS with Moolank ${r.b.r} - name works against natural energy. Consider spelling adjustment.`,'neg');
  else line(`Name ${r.nc.r} is Neutral with Moolank ${r.b.r}.`,'body');
  if(r.dc){
    line(`Daily name "${dn}" = ${r.dc.r} (${PN[r.dc.r]||''})${r.dc.c>9?` | Compound ${r.dc.c}: ${CO[r.dc.c]||''}`:''}`, 'body');
    const dc_compat=gF(r.dc.r,r.b.r);
    if(dc_compat==='Friendly')line(`Daily name ${r.dc.r} is FRIENDLY with Moolank - reinforces positive energy.`,'pos');
    else if(dc_compat==='Hostile')line(`Daily name ${r.dc.r} CONFLICTS with Moolank - even informal use weakens energy.`,'neg');
  }
  if(r.grid.missing.includes(r.nc.r))line(`EXCELLENT: Name number ${r.nc.r} fills a MISSING slot in your Lo-Shu grid.`,'pos');
  divider();

  // ── MISSING NUMBERS ──
  if(r.missing.length>0){
    secHead(`Missing Numbers - ${r.missing.length} Energy Gaps`,'');
    line(`${r.missing.length} missing numbers represent areas needing conscious development.`,'warn');
    r.missing.forEach(n=>line(MISSING_NUM_MEANING[n]||`Missing ${n}`,'body'));
    divider();
  }

  // ── PERSONAL YEAR ──
  secHead(`Personal Year ${r.py} - 2026`,'Current Phase');
  line(r.py_mean||'','body');
  divider();

  // ── VEDIC NAKSHATRA ──
  if(r.ni){
    secHead(`Nakshatra Reading - ${r.ni.name}`,'Vedic 8/10');
    row('Nakshatra',r.ni.name,`Deity: ${r.ni.deity}`);
    row('Lord',r.ni.lord,PN[getNakLordNum(r.ni.lord)]||'');
    row('Pada',`Pada ${r.ni.pada}`,`Name letter: ${r.ni.letter}`);
    row('Navamsha',`${r.ni.navamsha} (${RE[r.ni.navamsha]||''})`,`Lord: ${r.ni.navLord}`);
    row('Rashi',`${r.ni.rashi} (${RE[r.ni.rashi]||''})`,`Lord: ${RL[r.ni.rashi]||''}`);
    row('Gana',r.ni.gana,r.ni.gana==='Deva'?'Divine temperament':r.ni.gana==='Manushya'?'Human, balanced':'Intense, independent');
    line(NAK_DEEP.lord_meaning[r.ni.lord]||'','body');
    line(NAK_DEEP.gana_meaning[r.ni.gana]||'','body');
    if(r.ni.navamsha===r.ni.rashi)line(`VARGOTTAMA: Rashi and Navamsha are the same sign (${r.ni.rashi}) - very powerful placement. Outer personality and inner soul fully aligned.`,'pos');
    if(r.aligned)line(`CHALDEAN-VEDIC ALIGNMENT: Nakshatra lord (${r.ni.lord}) matches Chaldean numbers - both systems confirm same energy.`,'pos');
    divider();
  }

  // ── CAREER ──
  if(r.md_deep){
    secHead('Career, Finance & Life Path','Chaldean + Vedic');
    line(r.md_deep.finance,'body');
    if(r.ni)line(`Vedic: ${NAK_DEEP.lord_meaning[r.ni.lord]||''}`,'body');
    line(`Kua ${r.kua} (${KE[r.kua]||''} element): Best work direction is ${KD[r.kua]||''}. Face this direction during important meetings and focused work.`,'pos');
    divider();

    // ── RELATIONSHIPS ──
    secHead('Relationships & Compatibility Pattern','Chaldean 8/10');
    line(r.md_deep.relation,'body');
    if(r.ni)line(`Vedic Gana: ${NAK_DEEP.gana_meaning[r.ni.gana]||''}`,'body');
    const friends=[1,2,3,4,5,6,7,8,9].filter(n=>gF(r.b.r,n)==='Friendly'||gF(r.b.r,n)==='Same');
    const enemies=[1,2,3,4,5,6,7,8,9].filter(n=>gF(r.b.r,n)==='Hostile');
    line(`Compatible numbers: ${friends.join(', ')}  |  Handle carefully: ${enemies.join(', ')}`,'body');
    divider();

    // ── HEALTH ──
    secHead('Health Tendencies','General Guidance');
    line(r.md_deep.health,'warn');
    line('These are tendencies, not certainties. A healthy lifestyle overrides numerical predispositions.','body');
    divider();
  }

  // ── DASHA ──
  if(maha||antar){

      if(h==='Friendly')sc+=2;if(h==='Same')sc+=3;if([19,24,23,15,21,33,42].includes(b.c))sc+=2;if([19,24,23,15,21,33,42].includes(l.c))sc+=1;
      const wdFr=gF(WDN[wd],b.r);if(wdFr==='Friendly')sc+=1;
      const ins=[];const neg=[];
      if(isD){ins.push(`Double ${b.r} — rare coherence!`)}

      return{b,l,wd,dt,g,isD,sc,h,ins,neg,d,m,y}};
    return{d1:calc(a1,b1,c1),d2:calc(a2,b2,c2)};
  },[d1d,d1m,d1y,d2d,d2m,d2y]);

  </div>);

  return(<div style={{display:'flex',flexDirection:'column',gap:16}}>

  if(birth===2)pts.push({type:'career',text:'Birth 2 (Moon): Arts, music, dance, hospitality, counseling, nursing, interior design, public-facing roles.'});

  if(birth===4)pts.push({type:'career',text:'Birth 4 (Rahu): Technology, IT, unconventional business, real estate, occult, research, innovation.'});
  if(birth===5)pts.push({type:'career',text:'Birth 5 (Mercury): Trading, communication, media, journalism, sales, marketing, stock market, travel industry.'});
  if(birth===6)pts.push({type:'career',text:'Birth 6 (Venus): Arts, entertainment, fashion, beauty, luxury brands, film, music, modelling, design.'});
  if(birth===7)pts.push({type:'career',text:'Birth 7 (Ketu): Research, spirituality, philosophy, writing, astrology, occult sciences, healing, IT.'});
  if(birth===8)pts.push({type:'career',text:'Birth 8 (Saturn): Law, judiciary, real estate, construction, mining, iron/steel, government service, management.'});
  if(birth===9)pts.push({type:'career',text:'Birth 9 (Mars): Military, police, sports, surgery, engineering, fire service, real estate, adventure.'});

  // LP career destiny
  if(lp!==birth){
    if(lp===1)pts.push({type:'career',text:'Destiny 1: Will eventually lead. Authority roles await. Independent career path is destiny.'});
    if(lp===2)pts.push({type:'career',text:'Destiny 2: Partnership-based success. Creative/artistic career is destiny. Collaborative roles.'});
    if(lp===3)pts.push({type:'career',text:'Destiny 3: Teaching, mentoring, or advisory roles. Knowledge is the path to wealth.'});
    if(lp===5)pts.push({type:'career',text:'Destiny 5: Multiple career changes. Travel-based careers. Communication/media is destiny.'});
    if(lp===6)pts.push({type:'career',text:'Destiny 6: Beauty, arts, entertainment industry. Luxury and aesthetics define career destiny.'});
    if(lp===8)pts.push({type:'career',text:'Destiny 8: Corporate power, large organizations. Late bloomer but reaches authority.'});
    if(lp===9)pts.push({type:'career',text:'Destiny 9: Public service, humanitarian work, sports leadership, defense sector.'});
  }

  // Sports analysis
  if([9,1,3].includes(birth))pts.push({type:'sport',text:`Birth ${birth}: Physical sports potential — cricket, football, athletics, martial arts.`});
  if([5].includes(birth))pts.push({type:'sport',text:'Birth 5: Quick reflexes — badminton, table tennis, racing, strategy sports like chess.'});
  if([2,6].includes(birth))pts.push({type:'sport',text:`Birth ${birth}: Aesthetic sports — dance-sport, gymnastics, figure skating, swimming.`});
  if([4,7,8].includes(birth))pts.push({type:'sport',text:`Birth ${birth}: Endurance sports — marathon, cycling, trekking, yoga competitions.`});

  // Nakshatra-based career
  if(ni){
    if(ni.lord==='Shukra')pts.push({type:'career',text:`Nakshatra ${ni.name} (Venus): Strong arts/entertainment/beauty career potential from Vedic chart.`});
    if(ni.lord==='Kuja')pts.push({type:'sport',text:`Nakshatra ${ni.name} (Mars): Physical sports and competitive careers strongly indicated.`});
    if(ni.lord==='Budha')pts.push({type:'career',text:`Nakshatra ${ni.name} (Mercury): Communication, business, writing, technology careers from Vedic chart.`});
    if(ni.lord==='Guru')pts.push({type:'career',text:`Nakshatra ${ni.name} (Jupiter): Teaching, law, finance, spiritual/advisory careers from Vedic chart.`});
    if(ni.lord==='Shani')pts.push({type:'career',text:`Nakshatra ${ni.name} (Saturn): Government, law, construction, mining — slow but steady career growth.`});
    if(ni.lord==='Surya')pts.push({type:'career',text:`Nakshatra ${ni.name} (Sun): Government, politics, authority, medicine — leadership roles.`});
    if(ni.lord==='Chandra')pts.push({type:'career',text:`Nakshatra ${ni.name} (Moon): Public-facing, hospitality, travel, creative arts, nursing.`});

  if([2,6,7].includes(birth))pts.push({type:'avoid',text:'Avoid aggressive competitive sports as professional career — numbers favor arts over athletics.'});

  return pts;

  if([6,3,9].includes(babyBirth.r))pos.push(`Baby Birth ${babyBirth.r} (${PN[babyBirth.r]}): This child brings financial growth energy. Family income likely to increase after birth.`);
  if([8,4].includes(babyBirth.r))neg.push(`Baby Birth ${babyBirth.r} (${PN[babyBirth.r]}): Initial expenses increase. Financial strain in first 2-3 years. Investment in child pays off later.`);
  if([5].includes(babyBirth.r))pos.push('Baby Birth 5 (Mercury): Multiple income opportunities open for parents after this child. Business expansion indicated.');
  if([2].includes(babyBirth.r))pos.push('Baby Birth 2 (Moon): Emotional harmony in family improves. Mother especially benefits from this child\'s presence.');
  if([1].includes(babyBirth.r))pos.push('Baby Birth 1 (Sun): Father\'s career/authority gets a boost after this child. Recognition increases.');
  if([7].includes(babyBirth.r))neg.push('Baby Birth 7 (Ketu): Spiritual growth for parents but material focus reduces. May need to balance spirituality with practical needs.');

  if(babyBirth.r===babyLP.r)pos.push(`DOUBLE ${babyBirth.r}: Rare coherent child. This child has clear purpose from birth. Less confusion = less parental stress in guiding them.`);

  // Parent-specific analysis
  if(fc){
    const bComp=gF(fc.b.r,babyBirth.r);
    if(bComp==='Friendly'||bComp==='Same')pos.push(`Father(B:${fc.b.r}) + Baby(B:${babyBirth.r}) = ${bComp}. Father-child bond is natural. Father's fortune grows through this child.`);
    if(bComp==='Hostile')neg.push(`Father(B:${fc.b.r}) + Baby(B:${babyBirth.r}) = Hostile. Father needs conscious effort to bond. May feel financially burdened initially.`);
    if(fc.b.r===babyLP.r)pos.push(`Father Birth ${fc.b.r} = Child LP ${babyLP.r}. This child carries forward father's potential. Father's unfulfilled dreams manifest through child.`);
    if(fc.lp.r===babyBirth.r)pos.push(`Father LP ${fc.lp.r} = Child Birth ${babyBirth.r}. Father's destiny supports child naturally. Guidance comes intuitively.`);
    timeline.push(`Father: Financial impact most visible in child's Personal Year 1 cycles (every 9 years from birth).`);
  }

  if(mc){
    const mComp=gF(mc.b.r,babyBirth.r);
    if(mComp==='Friendly'||mComp==='Same')pos.push(`Mother(B:${mc.b.r}) + Baby(B:${babyBirth.r}) = ${mComp}. Mother-child bond is strong. Mother's health/wellbeing improves.`);
    if(mComp==='Hostile')neg.push(`Mother(B:${mc.b.r}) + Baby(B:${babyBirth.r}) = Hostile. Mother may feel drained. Self-care is essential.`);
    if(mc.lp.r===babyBirth.r)pos.push(`Mother LP ${mc.lp.r} = Child Birth ${babyBirth.r}. Mother's destiny manifests through this child.`);
    timeline.push(`Mother: Emotional/health impact immediate. Financial impact visible within 1-2 years of birth.`);
  }

  if(ni){
    if(ni.navLord?.includes('Venus'))pos.push('Venus Navamsha child = brings beauty, luxury, and financial harmony to the family household.');
    if(ni.navLord?.includes('Jupiter'))pos.push('Jupiter Navamsha child = brings wisdom, spiritual growth, and wealth expansion to family.');
    if(ni.navLord?.includes('Saturn'))neg.push('Saturn Navamsha child = brings responsibility and maturation. Parents must work harder but build lasting wealth.');
    if(ni.navLord?.includes('Mars'))neg.push('Mars Navamsha child = high energy, demanding. Parents need patience. But child motivates family to achieve more.');
    if(ni.lord==='Shukra')timeline.push('Venus Nakshatra child: Financial improvement for family begins within 1 year of birth.');
    if(ni.lord==='Shani')timeline.push('Saturn Nakshatra child: Financial improvement is slow. Family sees results after child turns 5-7 years.');
    if(ni.lord==='Guru')timeline.push('Jupiter Nakshatra child: Fortune activates for family when child starts education (age 5-6).');
  }

  if(pos.length===0&&!fc&&!mc)pos.push('Enter parent details above to see specific financial impact analysis.');
  if(neg.length===0)neg.push('No major financial challenges indicated from the numbers. Standard parenting expenses apply.');

  return{positives:pos,negatives:neg,timeline};
}

function getRemedies(grid,birth,lp,nameN){
  const rems=[];
  const missing=grid.missing;

  if(missing.length>0){
    // Name remedy
    const friendlyMissing=missing.filter(n=>gF(n,birth)!=='Hostile'&&gF(n,lp)!=='Hostile');
    if(friendlyMissing.length>0){
      rems.push({type:'name',text:`Choose a name vibrating at ${friendlyMissing[0]} (${PN[friendlyMissing[0]]}) to fill the most important missing number. This is the PRIMARY remedy.`});
      if(friendlyMissing.length>1)rems.push({type:'name',text:`Alternative name numbers: ${friendlyMissing.slice(1).map(n=>`${n}(${PN[n]?.split('(')[0]})`).join(', ')}. All friendly with Birth and LP.`});
    }

    // Color remedies for missing numbers
    const colorMap={1:'Red/Orange (Surya)',2:'White/Silver (Moon)',3:'Yellow/Gold (Jupiter)',4:'Grey/Electric Blue (Rahu)',5:'Green (Mercury)',6:'Pink/White (Venus)',7:'Grey-Brown (Ketu)',8:'Dark Blue/Black (Saturn)',9:'Red/Maroon (Mars)'};
    const missingColors=missing.slice(0,3).map(n=>`${n}: ${colorMap[n]}`);
    rems.push({type:'color',text:`Dress child in colors of missing numbers: ${missingColors.join(' | ')}. Use in room decor, clothing, and accessories.`});

    // Gemstone suggestions (general)
    const gemMap={1:'Ruby (Manikya)',2:'Pearl (Moti)',3:'Yellow Sapphire (Pukhraj)',4:'Hessonite (Gomed)',5:'Emerald (Panna)',6:'Diamond/Opal (Heera)',7:"Cat's Eye (Lehsuniya)",8:'Blue Sapphire (Neelam)',9:'Red Coral (Moonga)'};
    if(missing.includes(3)||missing.includes(6))rems.push({type:'gem',text:`Consider ${missing.includes(3)?gemMap[3]:''}${missing.includes(3)&&missing.includes(6)?' or ':''}${missing.includes(6)?gemMap[6]:''} after consulting a Jyotishi. Gemstones for children should be worn only after age 12.`});
  }

  // General remedies based on birth number
  rems.push({type:'general',text:`Birth ${birth} child: ${birth<=3?'Morning sunlight exposure daily.':birth<=6?'Surround with music, art, and nature.':'Physical activity and discipline routine essential.'} This strengthens the birth number planet.`});

  if(nameN&&!missing.includes(nameN))rems.push({type:'name',text:`Current name (=${nameN}) already overlaps with DOB grid. Consider adjusting spelling to vibrate at a MISSING number instead for maximum benefit.`});

  return rems;
}

const TARA_FROM={
  0:'Janma',1:'Sampat',2:'Vipat',3:'Kshema',4:'Pratyak',5:'Sadhana',6:'Naidhana',7:'Mitra',8:'Parama Mitra'
};
const TARA_GOOD=[1,3,5,7,8]; // Sampat, Kshema, Sadhana, Mitra, Parama Mitra
const TARA_BAD=[0,2,4,6];    // Janma, Vipat, Pratyak, Naidhana

// Rahu Kaal by weekday (Bengaluru approximate - 6AM sunrise)
const RAHU_KAAL={0:'04:30PM-06:00PM',1:'07:30AM-09:00AM',2:'03:00PM-04:30PM',3:'12:00PM-01:30PM',4:'01:30PM-03:00PM',5:'10:30AM-12:00PM',6:'09:00AM-10:30AM'};
const RAHU_START_H={0:16,1:7,2:15,3:12,4:13,5:10,6:9};
const RAHU_END_H={0:18,1:9,2:16,3:13,4:15,5:12,6:10};

// Good Tithis for events (avoid 4,8,9,14,0=Amavasya,15=Purnima for vehicles)
const GOOD_TITHI_GENERAL=[2,3,5,7,10,11,13];
const BAD_TITHI_GENERAL=[4,8,9,14,0,15];

// Nakshatra index lookup
function getNakIdx(name){return NAK.findIndex(n=>n.n===name||n.n.toLowerCase()===name.toLowerCase())}

// Tarabalam calculation
function getTara(birthNakIdx, dayNakIdx){
  if(birthNakIdx<0||dayNakIdx<0)return{score:-1,name:'Unknown',good:false};
  const diff=((dayNakIdx-birthNakIdx)+27)%27;
  const taraPos=diff%9;
  return{score:taraPos,name:TARA_FROM[taraPos],good:TARA_GOOD.includes(taraPos)};
}

// Chandrashtama: Moon in 8th from birth Rashi
const RASHI_ORDER=['Mesha','Vrishabha','Mithuna','Karkata','Simha','Kanya','Tula','Vrishchika','Dhanu','Makara','Kumbha','Meena'];
function isChandrashtama(birthRashi, moonRashi){
  const bi=RASHI_ORDER.indexOf(birthRashi);const mi=RASHI_ORDER.indexOf(moonRashi);
  if(bi<0||mi<0)return false;
  return((mi-bi+12)%12)===7;
}

// Good Nakshatras for vehicle purchase (general)
const VEHICLE_GOOD_NAK=['Ashwini','Rohini','Mrigashira','Hasta','Chitra','Swati','Anuradha','Revati','U.Phalguni','U.Ashadha','Shravana'];
const VEHICLE_BAD_NAK=['Bharani','Ardra','Jyeshtha','Moola','P.Ashadha','P.Bhadrapada','Ashlesha'];

// Good Vara by event
const GOOD_VARA={vehicle:[1,3,4,5],house:[1,3,4,5],griha:[3,4,5],pooja:[0,1,3,4,5],business:[1,3,4,5],gold:[5,4,3]};
const BAD_VARA={vehicle:[6],house:[6],griha:[2,6],pooja:[2],business:[6],gold:[2,6]};

// Event labels
const EVENTS={vehicle:'Vehicle Purchase/Delivery',house:'Home/Property Purchase',griha:'Griha Pravesh (Housewarming)',pooja:'Pooja/Religious Function',business:'Business Launch/Shop Opening',gold:'Gold/Jewellery Purchase',travel:'Travel/Journey Start',job:'Job Joining'};

// ═══════ TAB 6: EVENT MUHURAT FINDER ═══════
function EventMuhurat(){
  const [name,sName]=useState('');
  const [day,sDay]=useState('');const [month,sMonth]=useState('');const [year,sYear]=useState('');
  const [rashi,sRashi]=useState('');
  const [nakI,sNakI]=useState('');
  const [event,sEvent]=useState('vehicle');
  const [mode,sMode]=useState('week'); // 'week' or 'month'
  const [selMonth,sSelMonth]=useState(String(new Date().getMonth()+1));
  const [selYear,sSelYear]=useState(String(new Date().getFullYear()));
  const [show,sShow]=useState(false);

  const today=new Date();

  // Core day analysis function — reused in both modes
  function analyzeDay(dateObj,birthNakIdx,eventType,dayIndex){
    const wd=dateObj.getDay();
    const dNum=dateObj.getDate(),mNum=dateObj.getMonth()+1,yNum=dateObj.getFullYear();
    const birth=cB(dNum),lp=cL(dNum,mNum,yNum);
    // Tarabalam — approximate (Moon moves ~1 Nak per day, cycles every 27 days from birth nak)
    const approxNakOfDay=(birthNakIdx+(dayIndex*2))%27;
    const tara=getTara(birthNakIdx,approxNakOfDay);
    const goodVara=(GOOD_VARA[eventType]||GOOD_VARA.vehicle).includes(wd);
    const badVara=(BAD_VARA[eventType]||BAD_VARA.vehicle).includes(wd);
    const rStart=RAHU_START_H[wd];const rEnd=RAHU_END_H[wd];
    // Chaldean date score
    const isAuspTithi=[2,3,5,7,10,11,13].includes(birth.r);
    const isDoubleNum=birth.r===lp.r;
    const isFortunateCmpd=[19,24,23,15,21,33,42].includes(birth.c);
    let score=5; // base
    let flags=[],warnings=[];
    if(goodVara){score+=2;flags.push(`${WD[wd]} — good for ${EVENTS[eventType]?.split('/')[0]}`);}
    if(badVara){score-=3;warnings.push(`${WD[wd]} — generally avoid for this event`);}
    if(tara.good){score+=2;flags.push(`Tara: ${tara.name} ✅`);}
    else if(tara.score>=0){score-=2;warnings.push(`Tara: ${tara.name} ❌ — unfavorable`);}
    if(isAuspTithi){score+=1;flags.push(`Strong Birth# ${birth.r}`);}
    if(isDoubleNum){score+=1;flags.push(`Double ${birth.r} — pure energy day`);}
    if(isFortunateCmpd){score+=1;flags.push(`Compound ${birth.c}: ${CO[birth.c]||''}`);}
    // Chandrashtama check (approximate — Moon in 8th from Rashi)
    // Moon moves ~1 sign per 2.5 days, approx from today
    if(rashi){
      const rashiIdx=RASHI_ORDER.indexOf(rashi);
      const approxMoonSign=(rashiIdx+Math.floor(dayIndex/2.3))%12;
      const moonSign=RASHI_ORDER[approxMoonSign];
      if(isChandrashtama(rashi,moonSign)){score-=3;warnings.push(`⚠️ Possible Chandrashtama (verify on Panchang)`);}
    }
    score=Math.max(0,Math.min(10,score));
    const verdict=score>=8?'GO':score>=6?'CAUTION':score>=4?'VERIFY':'AVOID';
    return{d:dateObj,dNum,mNum,yNum,wd,birth,lp,tara,goodVara,badVara,rStart,rEnd,score,flags,warnings,verdict,approxNak:NAK[approxNakOfDay]?.n};
  }

  // 7-day results
  const days7=useMemo(()=>{
    if(!nakI||nakI==='')return null;
    const birthNakIdx=parseInt(nakI);
    return Array.from({length:7},(_,i)=>{
      const d=new Date(today);d.setDate(today.getDate()+i);
      return analyzeDay(d,birthNakIdx,event,i);
    });
  },[nakI,event,rashi]);

  // Monthly calendar — all days, filter to GO+CAUTION only
  const monthDays=useMemo(()=>{
    if(!nakI||nakI===''||!selMonth||!selYear)return null;
    const birthNakIdx=parseInt(nakI);
    const m=parseInt(selMonth),y=parseInt(selYear);
    const daysInMonth=new Date(y,m,0).getDate();
    // offset — how many days from today to start of selected month
    const monthStart=new Date(y,m-1,1);
    const dayOffset=Math.round((monthStart-today)/(1000*60*60*24));
    const all=[];
    for(let d=1;d<=daysInMonth;d++){
      const dateObj=new Date(y,m-1,d);
      const idx=dayOffset+(d-1);
      const res=analyzeDay(dateObj,birthNakIdx,event,idx);
      all.push(res);
    }
    // Filter: only GO and CAUTION
    return all.filter(d=>d.verdict==='GO'||d.verdict==='CAUTION');
  },[nakI,event,rashi,selMonth,selYear]);

  const verdictColor={GO:'#15803D',CAUTION:'#92400E',VERIFY:'#B45309',AVOID:'#991B1B'};
  const verdictBg={GO:'rgba(21,128,61,0.08)',CAUTION:'rgba(146,64,14,0.08)',VERIFY:'rgba(180,83,9,0.08)',AVOID:'rgba(153,27,27,0.06)'};

  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

  const renderDayCard=(d,i,compact=false)=>(
    <div key={i} style={{background:'#FFFFFF',borderRadius:compact?10:12,padding:compact?10:14,border:`1px solid ${verdictColor[d.verdict]}40`}}>

        <div>
          <div style={{color:'#1C1C1E',fontWeight:'bold',fontSize:compact?12:14}}>
            {d.d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}
          </div>
          <div style={{color:'#6B6860',fontSize:9}}>B#{d.birth.r} LP#{d.lp.r} | Rahu:{d.rStart}:00–{d.rEnd}:00 | ~{d.approxNak}</div>
        </div>
        <div style={{textAlign:'center',flexShrink:0}}>
          <div style={{background:verdictBg[d.verdict],border:`2px solid ${verdictColor[d.verdict]}`,borderRadius:8,padding:'4px 10px',fontWeight:'bold',color:verdictColor[d.verdict],fontSize:13}}>{d.verdict}</div>
          <div style={{color:'#6B6860',fontSize:9,marginTop:1}}>{d.score}/10</div>
        </div>
      </div>
      {!compact&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
        <div style={{background:'#F8F4EE',borderRadius:8,padding:8}}>
          <div style={{color:'#166534',fontSize:9,fontWeight:'bold',marginBottom:3}}>POSITIVES</div>
          {d.flags.length>0?d.flags.map((f,j)=><div key={j} style={{fontSize:9,color:'#2D2D2D',paddingLeft:6,borderLeft:'2px solid #22c55e',marginBottom:2}}>{f}</div>)
          :<div style={{fontSize:9,color:'#8A8075'}}>No strong positives</div>}
        </div>
        <div style={{background:'#F8F4EE',borderRadius:8,padding:8}}>
          <div style={{color:'#991B1B',fontSize:9,fontWeight:'bold',marginBottom:3}}>WARNINGS</div>
          {d.warnings.length>0?d.warnings.map((w,j)=><div key={j} style={{fontSize:9,color:'#2D2D2D',paddingLeft:6,borderLeft:'2px solid #ef4444',marginBottom:2}}>{w}</div>)
          :<div style={{fontSize:9,color:'#166534'}}>No major warnings</div>}
        </div>
      </div>}
      {compact&&d.flags.length>0&&<div style={{fontSize:9,color:'#166534',marginTop:3}}>{d.flags.slice(0,2).join(' | ')}</div>}
      {compact&&d.warnings.length>0&&<div style={{fontSize:9,color:'#991B1B',marginTop:2}}>{d.warnings.slice(0,1).join('')}</div>}
      {d.verdict!=='AVOID'&&<div style={{marginTop:6,fontSize:9,color:'#7A5C10',background:'rgba(139,105,20,0.06)',borderRadius:6,padding:5}}>
        Best time: Morning before {d.rStart}:00 or after {d.rEnd}:00. Verify Nakshatra on DrikPanchang.
      </div>}
    </div>
  );

  return(<div style={{display:'flex',flexDirection:'column',gap:16}}>
    <div style={CS}>
      <h3 style={{color:'#8B6914',fontWeight:'bold',fontSize:17,marginBottom:4}}>Event Muhurat Finder</h3>
      <p style={{color:'#8A8075',fontSize:10,marginBottom:10}}>Find auspicious dates for any event — vehicle, home, pooja, business, travel and more.</p>

      {/* Input form */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
        <div style={{gridColumn:'1/-1'}}><label style={{fontSize:9,color:'#6B6860'}}>Client Name</label>
          <input style={IS} value={name} onChange={e=>sName(e.target.value)} placeholder="Name" autoComplete="off"/></div>
        <div style={{gridColumn:'1/-1'}}><DateDropdowns day={day} setDay={sDay} month={month} setMonth={sMonth} year={year} setYear={sYear} yearStart={1940} yearEnd={2010} label="Date of Birth"/></div>
        <div><label style={{fontSize:9,color:'#6B6860'}}>Rashi</label>
          <select style={SS} value={rashi} onChange={e=>sRashi(e.target.value)}>
            <option value="">Select Rashi</option>
            {RASHI_ORDER.map(r=><option key={r} value={r}>{r} ({RE[r]})</option>)}
          </select></div>
        <div><label style={{fontSize:9,color:'#6B6860'}}>Birth Nakshatra</label>
          <select style={SS} value={nakI} onChange={e=>sNakI(e.target.value)}>
            <option value="">Select</option>
            {NAK.map((n,i)=><option key={i} value={i}>{n.n} ({n.lord})</option>)}
          </select></div>
        <div style={{gridColumn:'1/-1'}}><label style={{fontSize:9,color:'#6B6860'}}>Event Type</label>
          <select style={SS} value={event} onChange={e=>sEvent(e.target.value)}>
            {Object.entries(EVENTS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select></div>
      </div>

      {/* Mode toggle */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:9,color:'#6B6860',marginBottom:4}}>View Mode</div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>sMode('week')} style={{flex:1,padding:'10px',borderRadius:10,border:'none',cursor:'pointer',fontWeight:'bold',fontSize:12,
            background:mode==='week'?'#b45309':'#111827',color:mode==='week'?'#fff':'#6b7280'}}>
            📅 Next 7 Days

          <button onClick={()=>sMode('month')} style={{flex:1,padding:'10px',borderRadius:10,border:'none',cursor:'pointer',fontWeight:'bold',fontSize:12,
            background:mode==='month'?'#b45309':'#111827',color:mode==='month'?'#fff':'#6b7280'}}>

          <select style={SS} value={selYear} onChange={e=>sSelYear(e.target.value)}>
            {[2026,2027,2028,2029,2030].map(y=><option key={y} value={y}>{y}</option>)}
          </select></div>

      <div style={{padding:8,background:'rgba(139,105,20,0.06)',borderRadius:8,fontSize:9,color:'#7A5C10',border:'1px solid rgba(245,158,11,.2)',marginBottom:10}}>

      </button>

              No strongly auspicious days found in {MONTHS[parseInt(selMonth)-1]} {selYear} for this Nakshatra and event. Try a different month or adjust event type.

// ── STREE DIRGHA ──
// Husband's Nakshatra should be >9 positions from wife's Nakshatra
function getStreeDirgha(husbNak,wifeNak){
  const hi=NAK.findIndex(n=>n.n===husbNak);
  const wi=NAK.findIndex(n=>n.n===wifeNak);
  if(hi<0||wi<0)return{pass:true,score:0,note:'Unknown'};
  const dist=((hi-wi)+27)%27;
  if(dist>=9)return{pass:true,score:0,note:`Stree Dirgha OK — husband's Nakshatra is ${dist} positions ahead`};
  return{pass:false,score:-1,note:`Stree Dirgha issue — husband's Nakshatra is only ${dist} positions ahead (needs 9+)`};
}

// ── VARNA ──
const VARNA_MAP={Simha:4,Mesha:4,Dhanu:4,Karkata:3,Vrishchika:3,Meena:3,Mithuna:2,Tula:2,Kumbha:2,Vrishabha:1,Kanya:1,Makara:1};
const VARNA_NAME={4:'Kshatriya (Warrior)',3:'Brahmin (Scholar)',2:'Vaishya (Merchant)',1:'Shudra (Artisan)'};

// ── VASHYA ──
const VASHYA_MAP={Mesha:['Simha','Vrishchika'],Vrishabha:['Karkata','Tula'],Mithuna:['Kanya','Mithuna'],Karkata:['Vrishchika','Dhanu'],Simha:['Tula'],Kanya:['Meena','Mithuna'],Tula:['Makara','Makar'],Vrishchika:['Karkata'],Dhanu:['Meena'],Makara:['Mesha','Kumbha'],Kumbha:['Mesha'],Meena:['Makara','Mithuna']};

const RASHI_LORD_NUM={Mesha:9,Vrishabha:6,Mithuna:5,Karkata:2,Simha:1,Kanya:5,Tula:6,Vrishchika:9,Dhanu:3,Makara:8,Kumbha:8,Meena:3};

// ── DOSHA EXCEPTION RULES ──
function checkNadiException(n1,n2,r1,r2){
  // Cancelled if: same Rashi different Nakshatra, OR same Nakshatra different Pada
  if(r1&&r2&&r1===r2&&n1!==n2)return{cancelled:true,reason:'Same Rashi, different Nakshatra — Nadi Dosha cancelled'};
  if(n1===n2)return{cancelled:false,reason:'Same Nakshatra — Nadi Dosha applies (Pada check needed)'};
  return{cancelled:false,reason:'Different Rashi and Nakshatra — Nadi Dosha applies'};
}

function checkNadiExceptionByPada(n1,p1,n2,p2){
  if(n1===n2&&p1!==p2)return{cancelled:true,reason:`Same Nakshatra (${n1}) but different Pada (${p1} vs ${p2}) — Nadi Dosha CANCELLED`};
  return{cancelled:false,reason:''};
}

function checkBhakootException(r1,r2){
  const l1=RASHI_LORD_NUM[r1],l2=RASHI_LORD_NUM[r2];
  if(!l1||!l2)return{cancelled:false,reason:''};
  const fr=gF(l1,l2);
  if(fr==='Friendly'||fr==='Same')return{cancelled:true,reason:`Bhakoot Dosha cancelled — Rashi lords ${RL[r1]?.split('(')[0]} and ${RL[r2]?.split('(')[0]} are ${fr}`};
  return{cancelled:false,reason:'Rashi lords are not friendly — Bhakoot Dosha applies'};
}

function checkGanaException(g1,g2,r1,r2){
  // Gana Dosha partially cancelled if Venus in same sign or Moon lords friendly
  if(g1==='Rakshasa'&&g2==='Deva'||g1==='Deva'&&g2==='Rakshasa'){
    const l1=RASHI_LORD_NUM[r1],l2=RASHI_LORD_NUM[r2];
    if(l1&&l2&&gF(l1,l2)==='Friendly')return{cancelled:true,reason:'Gana Dosha mitigated — Rashi lords are friendly (partial cancellation)'};
    return{cancelled:false,reason:'Full Gana Dosha — significant temperament mismatch'};
  }
  return{cancelled:false,reason:''};
}

// ── ALL KOOTA CALCULATIONS ──
function calcAllKootas(nak1,pada1,nak2,pada2,rashi1,rashi2){
  const n1=nak1,n2=nak2;
  const ni1=NAK.findIndex(n=>n.n===n1);
  const ni2=NAK.findIndex(n=>n.n===n2);
  const g1=ni1>=0?NAK[ni1].gana:'';
  const g2=ni2>=0?NAK[ni2].gana:'';
  const nav1=ni1>=0&&pada1?NAK[ni1].nav[pada1-1]:'';
  const nav2=ni2>=0&&pada2?NAK[ni2].nav[pada2-1]:'';
  const navLord1=nav1?RL[nav1]?.split('(')[0]:'';
  const navLord2=nav2?RL[nav2]?.split('(')[0]:'';
  const navLordNum1=RASHI_LORD_NUM[nav1]||0;
  const navLordNum2=RASHI_LORD_NUM[nav2]||0;

  // 1. Varna (max 1)
  const v1=VARNA_MAP[rashi1]||2,v2=VARNA_MAP[rashi2]||2;
  const varnaScore=v1>=v2?1:0;
  const varna={score:varnaScore,max:1,
    note:`P1: ${VARNA_NAME[v1]||'—'} | P2: ${VARNA_NAME[v2]||'—'} | ${varnaScore===1?'Compatible':'Varna mismatch'}`};

  // 2. Vashya (max 2)
  const v1r=VASHYA_MAP[rashi1]||[],v2r=VASHYA_MAP[rashi2]||[];
  let vashyaScore=0;let vashyaNote='No Vashya';
  if(v1r.includes(rashi2)){vashyaScore=2;vashyaNote='Strong Vashya — magnetic attraction';}
  else if(v2r.includes(rashi1)){vashyaScore=1;vashyaNote='Partial Vashya — moderate attraction';}
  const vashya={score:vashyaScore,max:2,note:vashyaNote};

  // 3. Tara (max 3) — mutual
  const t1=getTara(ni1,ni2),t2=getTara(ni2,ni1);
  let taraScore=0;
  if(t1.good)taraScore+=1;if(t2.good)taraScore+=1;
  if(t1.good&&t2.good)taraScore=3;else if(t1.good||t2.good)taraScore=1;
  const tara={score:taraScore,max:3,note:`P1→P2: ${t1.name} (${t1.good?'✅':'❌'}) | P2→P1: ${t2.name} (${t2.good?'✅':'❌'})`};

  // 4. Yoni (max 4)
  const y1=YONI_MAP[n1],y2=YONI_MAP[n2];
  let yoniScore=2;let yoniNote='Neutral';
  if(y1&&y2){
    if(y1===y2){yoniScore=4;yoniNote=`Same Yoni (${y1}) — excellent physical harmony`;}
    else if(YONI_ENEMY[y1]===y2||YONI_ENEMY[y2]===y1){yoniScore=0;yoniNote=`${y1}+${y2} = Enemy Yoni — physical incompatibility risk`;}
    else{yoniScore=2;yoniNote=`${y1}+${y2} = Neutral Yoni — acceptable`;}
  }
  const yoni={score:yoniScore,max:4,note:yoniNote};

  // 5. Graha Maitri (max 5)
  const gml1=RASHI_LORD_NUM[rashi1],gml2=RASHI_LORD_NUM[rashi2];
  let gmScore=3;let gmNote='Unknown';
  if(gml1&&gml2){
    const fr=gF(gml1,gml2);
    if(fr==='Same'){gmScore=5;gmNote=`Both ruled by same planet (${RL[rashi1]?.split('(')[0]}) — strong mental bond`;}
    else if(fr==='Friendly'){gmScore=4;gmNote=`${RL[rashi1]?.split('(')[0]}+${RL[rashi2]?.split('(')[0]} = Friends — good mental compatibility`;}
    else if(fr==='Hostile'){gmScore=1;gmNote=`${RL[rashi1]?.split('(')[0]}+${RL[rashi2]?.split('(')[0]} = Enemies — mental friction`;}
    else{gmScore=3;gmNote=`${RL[rashi1]?.split('(')[0]}+${RL[rashi2]?.split('(')[0]} = Neutral — moderate`;}
  }
  const grahaMaitri={score:gmScore,max:5,note:gmNote};

  // 6. Gana (max 6)
  const gt1=GANA_TYPE[g1]??-1,gt2=GANA_TYPE[g2]??-1;
  const ganaScore=gt1>=0&&gt2>=0?GANA_SCORE[gt1][gt2]:3;
  const ganaKey=`${gt1}-${gt2}`;
  const ganaDosha=ganaScore<=1;
  const ganaExc=ganaDosha&&rashi1&&rashi2?checkGanaException(g1,g2,rashi1,rashi2):{cancelled:false,reason:''};
  const gana={score:ganaDosha&&ganaExc.cancelled?3:ganaScore,max:6,dosha:ganaDosha,
    cancelled:ganaExc.cancelled,cancellationReason:ganaExc.reason,
    note:GANA_NOTE[ganaKey]||`${g1||'?'}+${g2||'?'}`};

  // 7. Bhakoot (max 7)
  const bi1=RASHI_ORDER.indexOf(rashi1),bi2=RASHI_ORDER.indexOf(rashi2);
  let bhakootScore=7;let bhakootDosha=false;let bhakootNote='No Bhakoot Dosha — financial harmony';
  if(bi1>=0&&bi2>=0){
    const d1=((bi2-bi1)+12)%12+1,d2=((bi1-bi2)+12)%12+1;
    const badP=[[6,8],[2,12],[5,9]];
    for(const [a,b] of badP){
      if((d1===a&&d2===b)||(d1===b&&d2===a)){bhakootDosha=true;bhakootScore=0;bhakootNote=`Bhakoot Dosha (${d1}/${d2} pattern) — financial separation risk`;break;}
    }
  }
  const bhakootExc=bhakootDosha&&rashi1&&rashi2?checkBhakootException(rashi1,rashi2):{cancelled:false,reason:''};
  const bhakoot={score:bhakootDosha&&bhakootExc.cancelled?5:bhakootScore,max:7,dosha:bhakootDosha,
    cancelled:bhakootExc.cancelled,cancellationReason:bhakootExc.reason,note:bhakootNote};

  // 8. Nadi (max 8)
  const nd1=NADI_MAP[n1],nd2=NADI_MAP[n2];
  let nadiScore=8;let nadiDosha=false;let nadiNote='Different Nadi — full 8 points. Healthy progeny indicated.';
  if(nd1!==undefined&&nd2!==undefined&&nd1===nd2){
    nadiDosha=true;nadiScore=0;nadiNote=`NADI DOSHA — Both have ${NADI_NAME[nd1]}. Health and progeny concern.`;
  }
  const nadiExc1=nadiDosha&&rashi1&&rashi2?checkNadiException(n1,n2,rashi1,rashi2):{cancelled:false,reason:''};
  const nadiExc2=nadiDosha&&pada1&&pada2?checkNadiExceptionByPada(n1,pada1,n2,pada2):{cancelled:false,reason:''};
  const nadiCancelled=nadiExc1.cancelled||nadiExc2.cancelled;
  const nadiCancelReason=nadiExc1.cancelled?nadiExc1.reason:nadiExc2.cancelled?nadiExc2.reason:'';
  const nadi={score:nadiCancelled?6:nadiScore,max:8,dosha:nadiDosha,cancelled:nadiCancelled,
    cancellationReason:nadiCancelReason,note:nadiNote};

  // ── RAJJU ──
  const rj1=RAJJU_MAP[n1]??-1,rj2=RAJJU_MAP[n2]??-1;
  const rajjuDosha=rj1>=0&&rj2>=0&&rj1===rj2;
  const rajju={dosha:rajjuDosha,type:rj1>=0?RAJJU_NAME[rj1]:'Unknown',
    risk:rj1>=0?RAJJU_RISK[rj1]:'',cancelled:false,
    note:rajjuDosha?`RAJJU DOSHA — Both in ${RAJJU_NAME[rj1]}. ${RAJJU_RISK[rj1]}. Serious concern.`:'No Rajju Dosha — safe'};

  // ── VEDHA ──
  let vedhaDosha=false;let vedhaNote='No Vedha — no obstruction between Nakshatras';
  for(const [a,b] of VEDHA_PAIRS){
    if((n1===a&&n2===b)||(n1===b&&n2===a)){vedhaDosha=true;vedhaNote=`VEDHA DOSHA — ${n1}+${n2} pierce each other. Obstacles in marriage.`;break;}
  }
  const vedha={dosha:vedhaDosha,note:vedhaNote,cancelled:false};

  // ── STREE DIRGHA ──
  const sd=getStreeDirgha(n1,n2);

  // ── NAVAMSHA COMPATIBILITY (Pada-based) ──
  let navCompat={score:0,note:'Enter Pada for Navamsha analysis',hasData:false};
  if(nav1&&nav2){
    const navFr=gF(navLordNum1||0,navLordNum2||0);
    const isVarg1=nav1===rashi1,isVarg2=nav2===rashi2;
    let ns=0;
    if(navFr==='Same')ns=5;else if(navFr==='Friendly')ns=4;else if(navFr==='Hostile')ns=1;else ns=3;
    navCompat={score:ns,note:`P1 Navamsha: ${nav1}(${navLord1}) | P2 Navamsha: ${nav2}(${navLord2}) | Lords: ${navFr}`,
      hasData:true,isVarg1,isVarg2,nav1,nav2,navLord1,navLord2,navFr};
  }

  const kootas=[varna,vashya,tara,yoni,grahaMaitri,gana,bhakoot,nadi];
  const koota_labels=['Varna','Vashya','Tara','Yoni','Graha Maitri','Gana','Bhakoot','Nadi'];
  const total=kootas.reduce((a,k)=>a+k.score,0);

  return{kootas,koota_labels,total,gana,bhakoot,nadi,rajju,vedha,navCompat,streeDirgha:sd,g1,g2,nav1,nav2,navLord1,navLord2};
}

// ═══════ TAB 7: MARRIAGE COMPATIBILITY V2 ═══════
function MarriageCompat(){
  const [p1name,sP1n]=useState('');const [p1day,sP1d]=useState('');const [p1month,sP1m]=useState('');const [p1year,sP1y]=useState('');

  },[p1name,p1day,p1month,p1year,p1rashi,p1nak,p1pada,p2name,p2day,p2month,p2year,p2rashi,p2nak,p2pada]);

  const qColor={Excellent:'#4ade80','Very Good':'#86efac',Good:'#fbbf24',Acceptable:'#f97316','Needs Remedies':'#ef4444'};
  const cColor={Friendly:'#4ade80',Hostile:'#f87171',Neutral:'#fbbf24',Same:'#60a5fa'};

  return(<div style={{display:'flex',flexDirection:'column',gap:16}}>

      </div>

      {/* OVERALL ASSESSMENT */}
      <div style={CS}>
        <h4 style={{color:'#8B6914',fontWeight:'bold',marginBottom:10}}>Overall Marriage Assessment</h4>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div>
            <div style={{color:'#166534',fontWeight:'bold',fontSize:10,marginBottom:6}}>STRENGTHS</div>
            {r.bCompat==='Friendly'&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>Natural personality match — daily interactions flow easily.</div>}
            {r.bCompat==='Same'&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>Same Birth energy — deep intuitive understanding without words.</div>}
            {r.lCompat==='Friendly'&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>Life paths aligned — both grow in the same direction.</div>}
            {r.lCompat==='Same'&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>Shared destiny — powerful life purpose together.</div>}
            {r.koota.gana.score>=4&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>Gana compatible — similar temperament, arguments resolve quickly.</div>}

            {r.koota.nadi.dosha&&r.koota.nadi.cancelled&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>Nadi Dosha cancelled — {r.koota.nadi.cancellationReason}.</div>}
            {!r.koota.bhakoot.dosha&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>No Bhakoot Dosha — financial stability and family growth.</div>}
            {r.koota.bhakoot.dosha&&r.koota.bhakoot.cancelled&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>Bhakoot Dosha cancelled — {r.koota.bhakoot.cancellationReason}.</div>}
            {!r.koota.rajju.dosha&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>No Rajju Dosha — longevity and health of both partners protected.</div>}
            {!r.koota.vedha.dosha&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>No Vedha — no Nakshatra obstruction.</div>}
            {r.koota.navCompat.hasData&&r.koota.navCompat.navFr==='Friendly'&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>Navamsha lords friendly — deep soul compatibility.</div>}
            {r.koota.navCompat.isVarg1&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>Person 1 is Vargottama — strong inner character. Reliable partner.</div>}
            {r.koota.navCompat.isVarg2&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>Person 2 is Vargottama — strong inner character. Reliable partner.</div>}
            {r.finScore>=4&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #22c55e'}}>Strong financial compatibility — wealth grows after marriage.</div>}
          </div>
          <div>
            <div style={{color:'#991B1B',fontWeight:'bold',fontSize:10,marginBottom:6}}>CHALLENGES</div>
            {r.bCompat==='Hostile'&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #ef4444'}}>Birth numbers hostile — personality clashes. Needs conscious communication.</div>}
            {r.lCompat==='Hostile'&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #ef4444'}}>Life paths conflict — different life goals may create distance.</div>}
            {r.koota.gana.dosha&&!r.koota.gana.cancelled&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #ef4444'}}>Gana mismatch — one gentle, one intense. Daily friction possible.</div>}
            {r.koota.nadi.dosha&&!r.koota.nadi.cancelled&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #ef4444'}}>Nadi Dosha active — health and progeny concerns. Remedy essential.</div>}
            {r.koota.bhakoot.dosha&&!r.koota.bhakoot.cancelled&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #ef4444'}}>Bhakoot Dosha active — financial separation risk. Legal clarity needed.</div>}
            {r.koota.rajju.dosha&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #ef4444'}}>Rajju Dosha — {r.koota.rajju.risk}. Serious — must remedy before marriage.</div>}
            {r.koota.vedha.dosha&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #ef4444'}}>Vedha Dosha — Nakshatra obstruction. Graha Shanti recommended.</div>}
            {r.koota.navCompat.hasData&&r.koota.navCompat.navFr==='Hostile'&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #ef4444'}}>Navamsha lords hostile — inner natures conflict at soul level.</div>}
            {r.finScore<0&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #ef4444'}}>Financial tension — different money philosophies. Joint planning critical.</div>}
            {r.sharedMissing.length>=5&&<div style={{fontSize:9,color:'#2D2D2D',marginBottom:4,paddingLeft:6,borderLeft:'2px solid #ef4444'}}>{r.sharedMissing.length} numbers missing from BOTH grids — significant energy gaps to fill together.</div>}
          </div>
        </div>
      </div>

      {/* CONFIDENCE */}
      <div style={{...CS,fontSize:9,color:'#8A8075'}}>
        <h4 style={{color:'#8B6914',fontSize:11,fontWeight:'bold',marginBottom:6}}>Confidence Ratings</h4>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:3}}>
          <div>Nadi Koota: <b style={{color:'#166534'}}>9/10</b></div>
          <div>Gana Koota: <b style={{color:'#166534'}}>9/10</b></div>
          <div>Bhakoot Koota: <b style={{color:'#166534'}}>9/10</b></div>
          <div>Rajju Koota: <b style={{color:'#166534'}}>9/10</b></div>
          <div>Vedha Koota: <b style={{color:'#166534'}}>10/10</b></div>
          <div>Navamsha (Pada): <b style={{color:'#166534'}}>9/10</b></div>
          <div>Dosha Exceptions: <b style={{color:'#166534'}}>8.5/10</b></div>
          <div>Chaldean: <b style={{color:'#166534'}}>9/10</b></div>
          <div>Stree Dirgha: <b style={{color:'#166534'}}>9/10</b></div>
          <div>Mangal Dosha: <b style={{color:'#B45309'}}>5/10</b> (needs full chart)</div>
        </div>
        <div style={{marginTop:6,color:'#8A8075'}}>Overall with correct Nakshatra+Pada: <b style={{color:'#166534'}}>9/10</b>. Mangal Dosha and Dasha compatibility require full birth chart from Jyotishi.</div>
      </div>

      <PDFBtn targetId="marriage-results" filename={`${p1name||'P1'}_${p2name||'P2'}_Marriage_Compatibility.pdf`}/>
    </div>)}
  </div>);
}
